include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/deco.ini
include-file = ~/.config/polybar/system.ini


[bar/main]
width = 100%
wm-restack = bspwm
height = 32
bottom = true
fixed-center = true
margin-top = 0
margin-bottom = 0 
enable-ipc = true
background = ${colors.bg}
border-size = 7
border-color = ${colors.bg}

tray-position = right
tray-padding = 1
tray-background = ${colors.bg}

cursor-click = pointer
cursor-scroll = pointer
line-size = 3
module-margin-left = 0
module-margin-right = 0

modules-left = left bspwm bsplayout right network-down space-alt space-alt network-up
modules-right = left updates right space-alt left pulseaudio right space-alt left cpu space temp right space-alt left gpu right space-alt left memory right space-alt left time right powermenu

font-0 = JetBrainsMono Nerd Font Mono:style=Medium:size=11;3
font-1 = Font Awesome 6 Pro Solid:size=8;1
font-2 = Font Awesome 6 Pro Solid:size=11;3
font-3 = JetBrainsMono Nerd Font:style=Regular:size=21;5
font-4 = JetBrainsMono Nerd Font:style=Regular:size=16;4
font-5 = JetBrainsMono Nerd Font:style=Regular:size=20;4.5
font-6 = Font Awesome 6 Brands:size=11;3