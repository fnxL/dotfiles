[module/space]
type = custom/text
content = " "
content-foreground = ${colors.light-bg}
content-background = ${colors.light-bg}
content-font = 1

[module/space-alt]
type = custom/text
content = " "
content-background = ${colors.bg}
content-font = 1


[module/dot]
type = custom/text
content = 
content-foreground = ${colors.light-bg}
content-background = ${colors.bg}  
content-font = 1
content-padding = 1

[module/inverted-dot]
inherit = module/dot
content-background = ${colors.light-bg}
content-foreground = ${colors.black}

[module/left]
type = custom/text
content-foreground = ${colors.light-bg}
content = ""
content-font = 4                           

[module/right]
type = custom/text
content-foreground = ${colors.light-bg}
content = ""
content-font = 4
 